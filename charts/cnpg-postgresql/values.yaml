# -- Number of CloudNativePG instances.
replicaCount: 1

# -- PostgreSQL image settings.
image:
  # -- PostgreSQL image repository.
  repository: quay.io/okdp/sandbox-images/postgresql
  # -- PostgreSQL image pull policy.
  pullPolicy: IfNotPresent
  # -- PostgreSQL image tag. Defaults to the chart appVersion when empty.
  tag: "17.4.0-debian-12-r2"

# -- Image pull secrets for the PostgreSQL image.
imagePullSecrets: []

# -- Override the chart name.
nameOverride: ""

# -- Override the full release name.
fullnameOverride: ""

# -- Persistent storage settings for the CloudNativePG cluster.
storage:
  # -- PersistentVolumeClaim size for PostgreSQL data.
  size: 2Gi
  # -- StorageClass used for PostgreSQL data.
  class: standard

# -- Reclaim policy for CloudNativePG Database resources.
databaseReclaimPolicy: delete

# -- Logical PostgreSQL databases to create in the CloudNativePG cluster.
databases: []
