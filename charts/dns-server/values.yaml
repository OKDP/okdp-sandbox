# -- Number of DNS server replicas to run.
replicaCount: 1

image:
  # -- DNS server container image repository.
  repository: 4km3/dnsmasq
  # -- DNS server container image tag.
  tag: 2.90-r3
  # -- DNS server container image pull policy.
  pullPolicy: IfNotPresent

config:
  # -- Wildcard DNS suffix to resolve.
  domain: okdp.sandbox
  # -- IP address returned for the configured wildcard DNS suffix.
  target: 127.0.0.1

service:
  # -- Kubernetes Service type.
  type: NodePort
  # -- DNS service port.
  port: 53
  # -- NodePort used for UDP DNS queries. TCP uses the next port number.
  nodePort: 30053
  # -- Primary DNS protocol exposed by the first service port.
  protocol: UDP

# -- Container resource requests and limits.
resources:
  requests:
    memory: 32Mi
    cpu: 50m
  limits:
    memory: 64Mi
    cpu: 100m

# -- Override the chart name.
nameOverride: ""

# -- Override the full release name.
fullnameOverride: ""
