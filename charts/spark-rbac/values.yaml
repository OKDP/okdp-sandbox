# -- RBAC resource settings for Spark workloads.
rbac:
  # -- Create a Role and RoleBinding for Spark workloads.
  create: true
  # -- Extra annotations to add to RBAC resources.
  annotations: {}

# -- ServiceAccount settings for Spark workloads.
serviceAccount:
  # -- Create a ServiceAccount for Spark workloads.
  create: true
  # -- Automatically mount the ServiceAccount API credentials.
  automount: true
  # -- Extra annotations to add to the ServiceAccount.
  annotations: {}
  # -- ServiceAccount name to use. If empty and create is true, a name is generated using the fullname template.
  name: "spark"

