# -- Global chart settings.
global:
  # -- Namespace where certificates are stored. Defaults to the release namespace when empty.
  certificateNamespace: ""

# -- CA-backed cert-manager ClusterIssuers to create from provided CA material.
caClusterIssuers: []
# Each item should contain:
# - name: issuer-name                    # Name of the ClusterIssuer
#   ca_crt: LS0tLS1CRUdJTi...           # Base64 encoded CA certificate (required)
#   ca_key: LS0tLS1CRUdJTi...           # Base64 encoded CA private key (optional)
#
# Examples:
# - name: my-ca-issuer
#   ca_crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...
#   ca_key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t...
#
# WARNING: Including private keys in values is a security risk
# Consider using external secret management for ca_key values

# -- Self-signed cert-manager ClusterIssuers and CA certificates to create.
selfSignedClusterIssuers: []
# Each item should contain:
# - name: issuer-name                    # Name of the ClusterIssuer
#   certificate:                         # Certificate configuration (optional)
#     commonName: "My CA"                # Common name for the certificate
#     organization: "My Org"             # Organization name
#     country: "US"                      # Country code
#     validity: "8760h"                  # Certificate validity period (default: 1 year)
#     algorithm: "ECDSA"                 # Private key algorithm (RSA, ECDSA)
#     size: 256                          # Key size
#
# Examples:
# - name: self-signed-ca
#   certificate:
#     commonName: "Self-Signed CA"
#     organization: "OKDP"
#     country: "FR"

# -- trust-manager Bundle configuration.
bundle:
  # -- Enable trust bundle creation.
  enabled: false
  
  # -- Bundle name. Also used for target ConfigMap and Secret names.
  name: "certs-bundle"
  
  # -- Include default system CAs in the trust bundle.
  useDefaultCAs: true
  
  # -- Bundle target configuration.
  target:
    # -- ConfigMap bundle target settings.
    configMap:
      # -- Create a ConfigMap containing the trust bundle.
      enabled: false
      # -- ConfigMap data key used for the trust bundle.
      key: "root-certs.pem"
    
    # -- Secret bundle target settings.
    secret:
      # -- Create a Secret containing the trust bundle.
      enabled: false
      # -- Secret data key used for the trust bundle.
      key: "ca.crt"
    
    # -- Additional bundle output formats.
    additionalFormats:
      jks:
        # -- Enable JKS bundle output.
        enabled: false
        # -- JKS bundle data key.
        key: "bundle.jks"
      pkcs12:
        # -- Enable PKCS#12 bundle output.
        enabled: false
        # -- PKCS#12 bundle data key.
        key: "bundle.p12"
  
  # -- Namespace selector for bundle distribution.
  namespaceSelector:
    # -- Namespace labels that receive the bundle. Empty means all namespaces.
    matchLabels: {}

# -- Certificate replication settings.
replication:
  # -- Enable certificate replication across namespaces.
  enabled: true
  
  # -- Replication method. Supported values are "kubed" and "replicator".
  method: "replicator"
  
  # -- Namespace pattern for replication (regular expression).
  allowedNamespaces: ".*"

# -- Security settings.
security:
  # -- Pod Security Standards configuration.
  podSecurityStandards:
    # -- Enable Pod Security Standards enforcement.
    enabled: false
    # -- Pod Security Standards enforcement profile.
    enforce: "restricted" 
